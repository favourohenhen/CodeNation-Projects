<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
</head>
<body>
    <header>
        <nav>
      <ul>
        <li><a href="./index.html">To Back</a></li>
      </ul>
    </nav>
    </header>
     
    <main>
        <h1>Contact Form</h1>
         <form action="">
        <label for="fname">FirstName:</label>
        <input type="text" id="fname" required minlength="2">
        <br>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" required>
        <br>
        <br>
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" required placeholder="+234">
        <br>
        <br>
        <label for="subject">Subject</label>
       <select name="dropdown" id="subject" >
        <option value="0">Business</option>
        <option value="1">Business</option>
        <option value="2">Business</option>
        <option value="3">Business</option>
       </select>
       <br>
        <br>
       <label for="message">Message</label>
       <textarea name="" id="message" required minlength="20"></textarea>
       <br>
        <br>
         <input type="submit" value="Submit">
        
    </form>
    </main>
   
</body>
</html>
